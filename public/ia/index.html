<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <!-- ================= THEME INIT (como otros subdominios) ================= -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('theme');
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = saved || (prefersLight ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light');
      } catch {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=0.7, maximum-scale=1, user-scalable=yes" />
  <meta name="color-scheme" content="dark light" />
  <title>ia.alemty.eth</title>

  <!-- CSS GLOBAL -->

  <link rel="stylesheet" href="../shared/css/module.css">
  <link rel="stylesheet" href="../shared/css/shell.css">
  <link rel="stylesheet" href="../shared/css/profile.css">
  <link rel="stylesheet" href="../shared/css/notifications.css">
  <link rel="stylesheet" href="../shared/css/moderation.css">

  <!-- CSS IA -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Quicksand:wght@300..500&display=swap" rel="stylesheet" />
</head>
