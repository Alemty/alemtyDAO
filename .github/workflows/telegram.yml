
name: Telegram Deploy Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text=$'🚀 alemtyDAO Deploy\n\n✅ Status: SUCCESS\n👤 Actor: ${{ github.actor }}\n🌿 Branch: ${{ github.ref_name }}\n🧩 Commit: ${{ github.sha }}\n\n🌐 Live: https://alemty.eth.limo\n\n🔗 https://github.com/${{ github.repository }}/commit/${{ github.sha }}'
