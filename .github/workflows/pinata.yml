
name: Deploy Frontend to IPFS (Pinata)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare frontend bundle (NO assets)
        run: |
          rm -rf ipfs
          mkdir -p ipfs

          # Frontend SIN assets/ para descartar problemas de peso
          KEEP=(
            index.html
            css
            js
            shared
            dao
            token
            ar
            dex
            ia
          )

          for item in "${KEEP[@]}"; do
            if [ -e "$item" ]; then
              cp -R "$item" ipfs/
            fi
          done

          echo "✅ Frontend preparado (sin assets):"
          ls -1 ipfs

      - name: Upload frontend to Pinata (IPFS)
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          if (!jwt) throw new Error("PINATA_JWT not set");

          // Check auth first
          await got.get("https://api.pinata.cloud/data/testAuthentication", {
            headers: { Authorization: `Bearer ${jwt}` },
          });

          const src = "ipfs";
          const { files } = await rfs.read(src);

          const data = new FormData();

          for (const file of files) {
            data.append("file", fs.createReadStream(file), {

              filepath: basePathConverter(src, file),
            });
          }

          const res = await got.post(
            "https://api.pinata.cloud/pinning/pinFileToIPFS",
            {
              headers: {
                Authorization: `Bearer ${jwt}`,
                ...data.getHeaders(),
                Accept: "application/json",
              },
              body: data,
              timeout: { request: 300000 },
            }
          ).json();

          console.log("✅ Frontend IPFS CID (sin assets):", res.IpfsHash);
          NODE

