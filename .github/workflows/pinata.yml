
name: Upload site to IPFS (Pinata)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Copia todo el sitio (sin .git / .github / ipfs)
      - name: Prepare site folder
        run: |
          set -euo pipefail
          rm -rf ipfs
          mkdir ipfs
          shopt -s dotglob

          for item in *; do
            if [ "$item" != "ipfs" ] && \
               [ "$item" != ".git" ] && \
               [ "$item" != ".github" ]; then
              cp -R "$item" ipfs/
            fi
          done

          echo "Files ready for IPFS:"
          find ipfs -type f | wc -l

      # 🏷️ Build stamp para forzar CID nuevo
      - name: Add build stamp
        run: |
          {
            echo "repo=alemtyDAO"
            echo "site=alemty.eth"
            echo "sha=${GITHUB_SHA}"
            echo "run=${GITHUB_RUN_NUMBER}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > ipfs/build.txt

      # 🚀 Upload a Pinata (SECRET seguro)
      - name: Upload folder to Pinata
        env:
          PINATA_JWT: ${{ eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..Ztzh8tw1rMXqDYIbYBMygH1Wk9zQBAIhq0dCggjdNJg }}
        run: |
          npm init -y >/dev/null 2>&1
          npm install form-data recursive-fs base-path-converter got@14 >/dev/null 2>&1

          node --input-type=module <<'NODE'
          import fs from "fs";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import basePathConverter from "base-path-converter";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) {
            throw new Error("PINATA_JWT missing (check GitHub Secrets)");
          }

          const src = "ipfs";
          const { files } = await rfs.read(src);

          const data = new FormData();
          for (const file of files) {
            data.append("file", fs.createReadStream(file), {
              filepath: basePathConverter(src, file),
            });
          }

          data.append("pinataMetadata", JSON.stringify({ name: "alemty.eth" }));
          data.append("pinataOptions", JSON.stringify({ cidVersion: 1 }));

          const res = await got(
            "https://api.pinata.cloud/pinning/pinFileToIPFS",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${jwt}`,
              },
              body: data,
            }
          ).json();

          console.log("✅ IPFS CID:", res.IpfsHash);
          console.log("🌐 https://gateway.pinata.cloud/ipfs/" + res.IpfsHash + "/");
          NODE
