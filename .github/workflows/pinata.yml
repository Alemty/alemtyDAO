
name: Upload site to IPFS (Pinata)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare site files
        run: |
          rm -rf ipfs
          mkdir ipfs
          shopt -s dotglob
          for item in *; do
            if [[ "$item" != "ipfs" && "$item" != ".git" && "$item" != ".github" ]]; then
              cp -R "$item" ipfs/
            fi
          done

      - name: Upload to Pinata (IPFS)
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm init -y >/dev/null
          npm install got form-data recursive-fs >/dev/null

          node --input-type=module <<'NODE'
          import fs from "fs";
          import path from "path";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) throw new Error("PINATA_JWT not set");

          // Leer todos los archivos de la carpeta ipfs
          const { files } = await rfs.read("ipfs");

          const data = new FormData();

          // Agregar archivos (Pinata requiere filename, NO filepath)
          for (const file of files) {
            data.append(
              "file",
              fs.createReadStream(file),
              {
                filename: path.relative("ipfs", file)
              }
            );
          }

          // Requerido para subir carpetas
          data.append(
            "pinataOptions",
            JSON.stringify({ wrapWithDirectory: true })
          );

          const res = await got.post(
            "https://api.pinata.cloud/pinning/pinFileToIPFS",
            {
              headers: {
                Authorization: `Bearer ${jwt}`,
                ...data.getHeaders()
              },
              body: data
            }
          ).json();

          console.log("✅ IPFS CID:", res.IpfsHash);
          NODE

