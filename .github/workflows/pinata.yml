
name: Upload site to IPFS (Pinata)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare site
        run: |
          rm -rf ipfs
          mkdir ipfs
          shopt -s dotglob
          for item in *; do
            if [[ "$item" != "ipfs" && "$item" != ".git" && "$item" != ".github" ]]; then
              cp -R "$item" ipfs/
            fi
          done

      - name: Upload to Pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm init -y >/dev/null
          npm install got form-data recursive-fs base-path-converter >/dev/null

          node --input-type=module <<'NODE'
          import fs from "fs";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import basePathConverter from "base-path-converter";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) throw new Error("PINATA_JWT not set");

          const { files } = await rfs.read("ipfs");
          const data = new FormData();

          for (const f of files) {
            data.append("file", fs.createReadStream(f), {
              filepath: basePathConverter("ipfs", f),
            });
          }

          const res = await got.post(
            "https://api.pinata.cloud/pinning/pinFileToIPFS",
            {
              headers: { Authorization: `Bearer ${jwt}` },
              body: data
            }
          ).json();

          console.log("CID:", res.IpfsHash);
          NODE
