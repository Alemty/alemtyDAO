
name: Deploy frontend to IPFS (Pinata) — public only (single source)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify public/ bundle
        run: |
          echo "✅ Subiendo SOLO ./public a IPFS"
          echo "Contenido de public/:"
          ls -lah public

          echo "📦 Tamaño:"
          du -sh public || true

          echo "📄 Archivos:"
          find public -type f | wc -l || true

      - name: Upload public/ to Pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm init -y >/dev/null
          npm install got form-data recursive-fs base-path-converter >/dev/null

          cat > pinata_upload.mjs <<'EOF'
          import fs from "fs";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import basePathConverter from "base-path-converter";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) {
            console.error("❌ PINATA_JWT not set");
            process.exit(1);
          }

          // Auth check
          await got.get("https://api.pinata.cloud/data/testAuthentication", {
            headers: { Authorization: `Bearer ${jwt}` },
          });

          const src = "public";
          const { files } = await rfs.read(src);
          console.log(`📄 Files to upload: ${files.length}`);

          const data = new FormData();
          for (const file of files) {
            data.append("file", fs.createReadStream(file), {
              filepath: basePathConverter(src, file),
            });
          }

          data.append("pinataMetadata", JSON.stringify({
            name: "alemtyDAO-frontend-public"
          }));

          try {
            const res = await got.post(
              "https://api.pinata.cloud/pinning/pinFileToIPFS",
              {
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  ...data.getHeaders(),
                },
                body: data,
                timeout: { request: 300000 },
              }
            ).json();

            console.log("✅ IPFS CID:", res.IpfsHash);
            console.log("🔗 https://gateway.pinata.cloud/ipfs/" + res.IpfsHash);
            console.log("🌐 Actualiza contenthash de alemty.eth con este CID");
          } catch (err) {
            console.error("❌ Upload failed");
            console.error(err?.response?.body || err);
            process.exit(1);
          }
          EOF

          node pinata_upload.mjs
