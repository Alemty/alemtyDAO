
name: Deploy Frontend to IPFS (Pinata)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare frontend bundle
        run: |
          rm -rf ipfs
          mkdir -p ipfs

          # Frontends que SÍ se publican
          KEEP=(
            index.html
            css
            js
            assets
            shared
            dao
            token
            ar
            dex
            ia
          )

          for item in "${KEEP[@]}"; do
            if [ -e "$item" ]; then
              cp -R "$item" ipfs/
            fi
          done

          echo "✅ Frontend preparado:"
          ls -1 ipfs

      - name: Upload frontend to Pinata (IPFS)
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm init -y >/dev/null
          npm install got form-data recursive-fs >/dev/null

          node --input-type=module <<'NODE'
          import fs from "fs";
          import path from "path";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) throw new Error("PINATA_JWT not set");

          // Verificar auth primero
          await got.get("https://api.pinata.cloud/data/testAuthentication", {
            headers: { Authorization: `Bearer ${jwt}` },
          });

          const { files } = await rfs.read("ipfs");

          const data = new FormData();

          for (const file of files) {
            const rel = path.relative("ipfs", file);

            // Ignorar archivos ocultos por seguridad
            if (rel.startsWith(".")) continue;

            data.append(
              "file",
              fs.createReadStream(file),
              { filename: rel }
            );
          }

          data.append(
            "pinataOptions",
            JSON.stringify({ wrapWithDirectory: true })
          );

          const res = await got.post(
            "https://api.pinata.cloud/pinning/pinFileToIPFS",
            {
              headers: {
                Authorization: `Bearer ${jwt}`,
                ...data.getHeaders(),
                Accept: "application/json",
              },
              body: data,
              timeout: { request: 300000 },
            }
          ).json();

          console.log("✅ Frontend IPFS CID:", res.IpfsHash);
          NODE

