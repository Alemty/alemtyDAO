
name: Deploy Frontend to IPFS (Pinata)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pinata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare frontend bundle (NO assets)
        run: |
          rm -rf ipfs
          mkdir -p ipfs

          KEEP=(
            index.html
            css
            js
            shared
            dao
            token
            ar
            dex
            ia
          )

          for item in "${KEEP[@]}"; do
            if [ -e "$item" ]; then
              cp -R "$item" ipfs/
            fi
          done

          echo "✅ Frontend preparado (sin assets):"
          ls -1 ipfs

      - name: Upload frontend to Pinata (IPFS)
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm init -y >/dev/null
          npm install got form-data recursive-fs base-path-converter >/dev/null

          cat > pinata_upload.mjs <<'EOF'
          import fs from "fs";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import basePathConverter from "base-path-converter";
          import got from "got";

          const jwt = process.env.PINATA_JWT;
          if (!jwt) {
            console.error("❌ PINATA_JWT not set (GitHub Secret missing or empty)");
            process.exit(1);
          }

          // Check auth first
          await got.get("https://api.pinata.cloud/data/testAuthentication", {
            headers: { Authorization: `Bearer ${jwt}` },
          });

          const src = "ipfs";
          const { files } = await rfs.read(src);

          const data = new FormData();

          for (const file of files) {
            data.append("file", fs.createReadStream(file), {
              filepath: basePathConverter(src, file),
            });
          }

          const res = await got.post("https://api.pinata.cloud/pinning/pinFileToIPFS", {
            headers: {
              Authorization: `Bearer ${jwt}`,
              ...data.getHeaders(),
              Accept: "application/json",
            },
            body: data,
            timeout: { request: 300000 },
          }).json();

          console.log("✅ Frontend IPFS CID (sin assets):", res.IpfsHash);
          EOF

          node pinata_upload.mjs
